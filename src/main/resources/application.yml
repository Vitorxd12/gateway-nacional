spring:
  application:
    name: gateway-nacional

  # Habilita Virtual Threads (Project Loom / JEP 444).
  # Cada request HTTP roda em uma virtual thread, permitindo altíssima concorrência
  # em chamadas I/O-bound (ViaCEP, ReceitaWS) sem o custo de pool de threads tradicional.
  threads:
    virtual:
      enabled: true

  data:
    redis:
      # Redis é usado como cache distribuído de respostas (CEP/CNPJ).
      # Em produção, sobrescrever via variável de ambiente SPRING_DATA_REDIS_HOST.
      host: localhost
      port: 6379
      timeout: 2s
      connect-timeout: 1s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2

  # Sem datasource global autoconfigurado.
  # O SIGTAP gerencia o próprio SQLite embarcado em runtime (somente quando
  # GATEWAY_SIGTAP_CRON_ENABLED=true). Sem Flyway, sem Hibernate, sem JPA —
  # boot continua zero-cost para self-hosts que não usam o módulo.
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.health.DataSourceHealthContributorAutoConfiguration

server:
  port: 8080
  # Encerramento gracioso: drena requests em voo antes de finalizar (importante em rolling deploys).
  shutdown: graceful

gateway:
  rate-limit:
    enabled: false # Mantido desativado por padrão para uso corporativo (Self-Hosted). Para o Playground público, injetar env GATEWAY_RATE_LIMIT_ENABLED=true
  captcha:
    solver:
      # Provider de resolução de reCAPTCHA: capsolver (padrão) | 2captcha
      # Necessário para BLL/BNC filtragem por UF via AJAX (sem chave: 100 itens SSR).
      provider: ${GATEWAY_CAPTCHA_SOLVER_PROVIDER:capsolver}
      key: ${GATEWAY_CAPTCHA_SOLVER_KEY:}
  flaresolverr:
    # URL do sidecar FlareSolverr (https://github.com/FlareSolverr/FlareSolverr).
    # OPCIONAL para o módulo Placa (fallback PlacaFipe). OBRIGATÓRIO para
    # CNES, e-Gestor e FIPE-Oficial — sem ele, essas rotas devolvem 503 com
    # "Esta rota exige a ativação do sidecar FlareSolverr...".
    url: ${GATEWAY_FLARESOLVERR_URL:}
    max-timeout-ms: 60000
  # ─────────────────────────────────────────────────────────────────────────
  # Sidecar Python dedicado para SISAB Validação. Necessário porque a página
  # JSF/Mojarra usa plugins Bootstrap Multiselect cujo estado só sincroniza
  # via cliques reais no DOM — FlareSolverr v3 não expõe primitivas de
  # interação JS (executeJS, click). Container provido em
  # services/sisab-sidecar/ no docker-compose.
  sisab-sidecar:
    url: ${GATEWAY_SISAB_SIDECAR_URL:}
  # Base URLs por provedor — sobrescritas em test profile (WireMock) e
  # eventualmente em deploys que precisem apontar para mirrors internos.
  cep:
    # Tier 1 — endereço base (hedge entre 3 providers). Sem geo.
    viacep:
      base-url: https://viacep.com.br
    brasilapi:
      base-url: https://brasilapi.com.br
    awesomeapi:
      base-url: https://cep.awesomeapi.com.br
    # Tier 2 — backfill de geocodificação. Acionado apenas quando o tier 1
    # não trouxe lat/long (AwesomeAPI o faz no caminho rápido; ViaCEP e
    # BrasilAPI v1 não). Cascata oportunista: BrasilAPI v2 → Nominatim direto.
    nominatim:
      # Para deploys self-host de alto volume, apontar para uma instância
      # privada Docker (mediagis/nominatim) — o servidor público do OSM
      # rate-limita 1 req/s por IP. O cache de 30d sobre o resultado já
      # absorve quase todo o tráfego, mas em pico de cold-start vale a pena.
      base-url: https://nominatim.openstreetmap.org
      # Política do Nominatim: User-Agent identificável é obrigatório. Caso
      # contrário o servidor recusa a request. Personalizar via env para
      # deploys que querem rastreabilidade própria.
      user-agent: ${GATEWAY_CEP_NOMINATIM_USER_AGENT:GatewayNacional/1.0 (+https://github.com/cernebr/gateway-nacional)}
  taxas:
    brasilapi:
      base-url: https://brasilapi.com.br
    bcb-sgs:
      base-url: https://api.bcb.gov.br
    hg-brasil:
      base-url: https://api.hgbrasil.com
      api-key: development
  rastreio:
    linketrack:
      base-url: https://api.linketrack.com
      user: teste
      # Token público de testes do Link&Track — para SLA produtivo, sobrescrever via env.
      token: 1abcd00b2731640e886fb41a8a9671ad1434c599dbaa0a0de9a5aa619f29a83f
    brasilapi:
      base-url: https://brasilapi.com.br
      path: /api/corretoras/v1/{codigo}
    correios-oficial:
      base-url: https://api.correios.com.br
      path: /srorastro/v1/objetos/{codigo}
  bancos:
    brasilapi:
      base-url: https://brasilapi.com.br
  isbn:
    # Consulta de dados bibliográficos por ISBN-10/13. Hedge entre 5 fontes:
    # BrasilAPI (primário, RULE B — já consolida internamente os 4 originais);
    # CBL (Câmara Brasileira do Livro via Azure Cognitive Search), Google Books,
    # Mercado Editorial (BR-only), Open Library (cobertura mundial e capa).
    # Cache 365d porque livro publicado é "frozen"; soft-TTL 90d via RAC.
    brasilapi:
      base-url: https://brasilapi.com.br
    cbl:
      base-url: https://isbn-search-br.search.windows.net
      # API key pública do site oficial da CBL (mesma usada pela BrasilAPI).
      # Vazia → o client decodifica o default base64 embutido. Sobrescrever
      # via GATEWAY_ISBN_CBL_API_KEY caso a CBL rotacione a chave.
      api-key: ${GATEWAY_ISBN_CBL_API_KEY:}
    google-books:
      base-url: https://www.googleapis.com/books/v1
    mercado-editorial:
      base-url: https://api.mercadoeditorial.org/api/v1.2
    open-library:
      base-url: https://openlibrary.org
  cambio:
    # Tier 1 — PTAX oficial (Banco Central). Hedge entre proxy BrasilAPI e
    # OLINDA direto: o primeiro a responder vence. Dados regulatórios usados
    # em IR, balanço contábil, contratos públicos.
    brasilapi:
      base-url: https://brasilapi.com.br
    bcb:
      # Endpoint OLINDA do BCB. Date format do upstream é MM-DD-YYYY (US-style).
      base-url: https://olinda.bcb.gov.br
      # Quantos dias retroceder antes de desistir (cobre Carnaval + fim de
      # semana adjacente). Cada moeda só faz UMA tentativa por data — a
      # data resolvida pelo par-sonda é reusada pelos demais.
      max-fallback-days: 7
    # Tier 2 — AwesomeAPI (spot real-time comercial). Único provider que
    # cobre cripto e cross-currency sem BRL. Cache 3min; só é invocado quando
    # PTAX não pode atender (par não-elegível ou ambos PTAX providers down).
    awesomeapi:
      base-url: https://economia.awesomeapi.com.br
  pix:
    # Listagem de participantes do PIX. Cascata BrasilAPI (primário, RULE B —
    # já consolida o CSV do BCB internamente) → BCB CSV oficial. Cache 24h
    # com soft-TTL 6h via RAC alinha com a cadência de publicação do BCB
    # (1 arquivo novo por dia útil bancário).
    brasilapi:
      base-url: https://brasilapi.com.br
    bcb:
      base-url: https://www.bcb.gov.br
      # Quantos dias retroceder antes de desistir do CSV. 7 cobre o caso
      # pior (Carnaval 5 dias úteis pulados + fim de semana adjacente).
      # Tunning: na maioria das requests, a 1ª tentativa (hoje) já resolve.
      max-fallback-days: 7
  juridico:
    sancoes:
      # CGU Portal da Transparência (CEIS) — exige header chave-api-dados
      # obtido por cadastro em portaldatransparencia.gov.br/api-de-dados/cadastrar-email.
      # Sem a chave, o SancoesClient curto-circuita antes do round-trip e
      # devolve 503 com mensagem específica.
      cgu:
        base-url: https://api.portaldatransparencia.gov.br
        path: /api-de-dados/ceis
        cnpj-param: cnpjSancionado
        api-key: ${GATEWAY_JURIDICO_SANCOES_CGU_API_KEY:}
    processos:
      # DataJud / CNJ — POST a /api_publica_{alias}/_search com body
      # Elasticsearch DSL. A api-key padrão é a chave pública documentada
      # pelo CNJ; sobrescrever via env caso o CNJ rotacione a credencial.
      datajud:
        base-url: https://api-publica.datajud.cnj.jus.br
        api-key: ${GATEWAY_JURIDICO_PROCESSOS_DATAJUD_API_KEY:cDZHYzlZa0JadVREZDJCendQbXY6SkJlTzNjLV9TRENyQk1RdnFKZGRQdw==}
  cnae:
    # Classificação Nacional de Atividades Econômicas — pareada com CNPJ.
    # IBGE servicodados é a fonte canônica (publica a tabela CONCLA).
    # Fallback é um JSON local bake-into-image em data/cnae_subclasses.json
    # — não precisa de configuração externa.
    ibge:
      base-url: https://servicodados.ibge.gov.br
  ibge:
    # Domínio geográfico próprio: lista de UFs, detalhe (com população),
    # municípios por UF. Hedge entre 2 providers REST simples para municípios.
    # Provider Wikipedia da BrasilAPI NÃO foi portado (política PESADO —
    # scraping HTML é frágil e custoso).
    gov:
      base-url: https://servicodados.ibge.gov.br
    dados-abertos-br:
      # API legada em HTTP (não HTTPS). Sobrescrever caso uma versão segura apareça.
      base-url: http://educacao.dadosabertosbr.com
    # Tier 2 — BrasilAPI fallback (só acionado quando gov + dados-abertos-br
    # estão indisponíveis simultaneamente).
    brasilapi:
      base-url: https://brasilapi.com.br
  cvm:
    # Cadastro CVM — corretoras (ZIP→CSV) e fundos (CSV direto). Tier 1:
    # download direto do dados.cvm.gov.br. Tier 2: BrasilAPI fallback (só
    # acionado quando o portal CVM está fora durante o refresh do snapshot).
    corretoras:
      url: https://dados.cvm.gov.br/dados/INTERMED/CAD/DADOS/cad_intermed.zip
    fundos:
      url: https://dados.cvm.gov.br/dados/FI/CAD/DADOS/cad_fi.csv
    brasilapi:
      base-url: https://brasilapi.com.br
  b3:
    # Tier 1: B3 oficial (base64-params no PATH, paginação paralela). Tier 2:
    # BrasilAPI fallback (já agrega todas as páginas internamente — devolve
    # lista completa numa chamada).
    base-url: https://sistemaswebb3-listados.b3.com.br
    brasilapi:
      base-url: https://brasilapi.com.br
  cptec:
    # Meteorologia (operacional/agro/logística). Hedge entre CPTEC/INPE
    # direto (XML legado, HTTP, sem TLS no subdomínio) e BrasilAPI (proxy
    # do mesmo XML com cobertura Cloudflare). O upstream pública cinco
    # rotas: cidade, capital, aeroporto/{icao}, previsão e ondas.
    inpe:
      base-url: https://servicos.cptec.inpe.br/XML
    brasilapi:
      base-url: https://brasilapi.com.br
  registrobr:
    # Disponibilidade de domínios .br. Hedge entre Registro.br direto
    # (JSON ajax/avail) e BrasilAPI (proxy). Cobre TODOS os TLDs .br
    # publicados pelo NIC.br (.com.br, .net.br, .gov.br, etc.).
    oficial:
      base-url: https://registro.br
    brasilapi:
      base-url: https://brasilapi.com.br
  tuss:
    # Terminologia Unificada da Saúde Suplementar — códigos publicados
    # pela ANS. Cascata BrasilAPI (proxy oficial — RULE B) → snapshot
    # local empacotado em data/tuss_terms.json. O snapshot garante que
    # o gateway responde mesmo se a BrasilAPI estiver fora.
    brasilapi:
      base-url: https://brasilapi.com.br
  ddd:
    # Tier 1: ANATEL CSV oficial (latin-1). Tier 2: BrasilAPI per-DDD fallback.
    anatel:
      url: https://www.anatel.gov.br/dadosabertos/PDA/Codigo_Nacional/PGCN.csv
    brasilapi:
      base-url: https://brasilapi.com.br
  ncm:
    # Nomenclatura Comum do Mercosul (NCM) — fundamental para emissão de
    # NF-e. Cascata BrasilAPI → Siscomex; cache de 30 dias.
    brasilapi:
      base-url: https://brasilapi.com.br
    siscomex:
      # O Portal Único Siscomex descontinuou a consulta individual por
      # código (a rota /classif/api/publico/nomenclatura/{codigo} retornava
      # 404). Hoje o canal oficial é o dump JSON da tabela inteira,
      # atualizado diariamente. O Siscomex responde 307 e redireciona para
      # `?perfil=PUBLICO`; o cliente segue o redirect automaticamente.
      url: https://portalunico.siscomex.gov.br/classif/api/publico/nomenclatura/download/json
  fipe:
    # Provedor primário: scraper direto da fundação oficial via FlareSolverr.
    # BrasilAPI e Parallelum entraram em colapso simultâneo em 2026-05 (proxies
    # deles bloqueados pelo upstream da FIPE) — ir direto na fonte com
    # FlareSolverr é o único caminho que não depende de terceiros frágeis.
    fipeorg:
      base-url: https://veiculos.fipe.org.br
    brasilapi:
      base-url: https://brasilapi.com.br
    parallelum:
      base-url: https://parallelum.com.br
      path: /fipe/api/v1/carros/veiculos/{codigoFipe}/{anoModelo}
  placa:
    wdapi:
      base-url: https://wdapi2.com.br
    keplaca:
      base-url: https://api.keplaca.com
      # Placeholder — sobrescrever via env GATEWAY_PLACA_KEPLACA_TOKEN em produção.
      # Com este valor, o KeplacaClient curto-circuita antes da chamada HTTP e
      # cascateia para o próximo provedor.
      token: your_token_here
    placafipe:
      # Fallback 100% gratuito (Web Scraping). Único provedor da cascata
      # que entrega o codigoFipe associado à placa — alimenta o módulo
      # Avaliação sem exigir codigoFipe manual do cliente.
      base-url: https://placafipe.com
      timeout-millis: 5000
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
  saude:
    # Portais governamentais de inteligência financeira da APS.
    # FNS é uma SPA que serve dados via JSON em endpoints internos —
    # quando gov.br aplica anti-bot, o CB trips e o gateway devolve 503
    # com mensagem clara em vez de stacktrace.
    fns:
      base-url: https://consultafns.saude.gov.br
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    egestor:
      base-url: https://relatorioaps-prd.saude.gov.br
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    cnes:
      # DATASUS — JSON puro nos endpoints internos /services/estabelecimentos-equipes.
      base-url: https://cnes.datasus.gov.br
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    sisab:
      # SISAB depende do sidecar Python dedicado (Selenium + Chromium headless)
      # configurado em `gateway.sisab-sidecar.url` na raiz deste arquivo.
      # As propriedades abaixo são documentação canônica do upstream — não
      # são usadas pelo cliente atual (delega 100% ao sidecar) mas ficam
      # como ponto de extensão futura.
      base-url: https://sisab.saude.gov.br
      report-path: /paginas/acessoRestrito/relatorio/federal/envio/RelValidacao.xhtml
    sigtap:
      # SIGTAP — Tabela Unificada de Procedimentos do SUS (DataSUS).
      # ETL roda em pipeline isolado das threads HTTP. O agendamento na
      # madrugada é OPT-IN — administrador do self-host deve setar
      # GATEWAY_SIGTAP_CRON_ENABLED=true para autorizar consumo de banda
      # e gravação em disco. O zip mensal tem ~25MB; o processo ~2 min.
      cron:
        enabled: ${GATEWAY_SIGTAP_CRON_ENABLED:false}
        # Madrugada para minimizar concorrência com tráfego operacional.
        # Cron 6-campos (Spring): seg min hor dia-mês mês dia-semana
        expression: ${GATEWAY_SIGTAP_CRON:0 0 3 * * *}
      download:
        # URL canônica do DataSUS para o pacote mensal. O placeholder
        # {competencia} é substituído em runtime por AAAAMM (ex: 202605).
        # Caso o gov mude o domínio, sobrescrever via env sem redeploy.
        base-url: ${GATEWAY_SIGTAP_DOWNLOAD_URL:http://sigtap.datasus.gov.br/tabela-unificada/app/sec/inicio.jsp}
        pacote-url-template: ${GATEWAY_SIGTAP_PACOTE_URL:ftp://ftp2.datasus.gov.br/public/sistemas/tup/downloads/TabelaUnificada_{competencia}_v{revisao}.zip}
        timeout-ms: 60000
      retry:
        # Exponential backoff entre tentativas dentro da mesma execução do job.
        # Ordem do DataSUS: instabilidade típica é noturna e dura ~15 min;
        # 5 tentativas com base 60s atinge cobertura de até ~30 min.
        max-attempts: 5
        initial-delay-ms: 60000
        multiplier: 2.0
      etl:
        # Diretório onde o pacote zip e os arquivos extraídos ficam
        # temporariamente durante o processamento. Limpo ao final.
        work-dir: ${GATEWAY_SIGTAP_WORK_DIR:${user.home}/.gateway-nacional/sigtap-work}
        # Quando true, o startup tenta carregar um fixture mínimo embarcado
        # em classpath:data/sigtap-fixture/ caso nenhuma competência esteja
        # ativa — útil para demos, testes e ambiente self-host antes do
        # primeiro download real do DataSUS.
        seed-on-empty: ${GATEWAY_SIGTAP_SEED_ON_EMPTY:true}
      database:
        # Arquivo SQLite embarcado. Só é tocado quando o cron está
        # habilitado — ETL cria o arquivo, o schema e popula sob demanda.
        # Para produção corporativa, apontar para volume persistente.
        path: ${GATEWAY_SIGTAP_DB_PATH:data/sigtap.db}
  licitacoes:
    # Módulo GovTech — integração unificada dos 4 portais cobertos pelo
    # gateway. Cascata sequencial (não hedge) para proteger a quota dos
    # portais frágeis (BLL/BNC bloqueiam IPs sob martelagem). RAC com
    # soft-TTL 30m / hard-TTL 12h absorve picos sem expor o ComprasNet à
    # carga repetida — chaves quentes refrescam em background.
    comprasnet:
      # PNCP — Portal Nacional de Compras Públicas. Sucessor oficial do
      # ComprasNet federal (Lei 14.133/2021 obriga publicação aqui). API
      # REST pública, sem credencial. Endpoint canônico:
      # /api/consulta/v1/contratacoes/proposta.
      base-url: https://pncp.gov.br
    bll:
      # Bolsa de Licitações e Leilões. Scraping HTML da página pública:
      # 100 itens SSR sem captcha. Com GATEWAY_CAPTCHA_SOLVER_KEY configurado,
      # ativa a busca filtrada por UF via /Process/GetProcessByParams.
      base-url: https://bllcompras.com
      user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
      timeout-millis: 12000
    bnc:
      # BNC usa a mesma plataforma ASP.NET da BLL (endpoints idênticos).
      base-url: https://bnccompras.com
      user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
      timeout-millis: 12000
    licitanet:
      api-base-url: https://www.licitanet.com.br
      public-base-url: https://www.licitanet.com.br
  avaliacao:
    # Marketplaces consultados via Web Scraping. URLs e templates são
    # configuráveis porque a estrutura dos sites muda — basta sobrescrever
    # via env (ex: GATEWAY_AVALIACAO_OLX_SEARCH_PATH) sem novo deploy.
    # User-Agent neutro e identificável; ajuste conforme política de
    # robots.txt e termos de uso de cada marketplace antes do uso produtivo.
    olx:
      base-url: https://www.olx.com.br
      search-path: /autos-e-pecas/carros-vans-e-utilitarios/{marca}/{modelo}/ano-{ano}
      timeout-millis: 5000
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    mobiauto:
      base-url: https://www.mobiauto.com.br
      search-path: /comprar/{marca}/{modelo}/{ano}
      timeout-millis: 5000
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)

# Actuator: expõe apenas o necessário para observabilidade externa.
# Prometheus faz scrape em /actuator/prometheus; health é consumido por liveness/readiness probes.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      # Tag global em todas as métricas — facilita filtros por instância no Grafana.
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Documentação OpenAPI / Swagger UI.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Configuração base do Resilience4j.
# Janela deslizante por contagem (10 chamadas) — adequada para APIs externas de baixo throughput.
# Failure rate 50% balanceia sensibilidade vs. ruído transitório do ViaCEP.
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true        # Expõe estado do CB no /actuator/health
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 10             # Não abre antes de ter amostra mínima
        failureRateThreshold: 50             # % de falhas para transicionar para OPEN
        waitDurationInOpenState: 15s         # Tempo em OPEN antes de tentar HALF_OPEN
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      # Uma instância por provedor — isola estado (open/closed/half-open) por upstream,
      # evitando que falha do ViaCEP "contamine" a saúde percebida do BrasilAPI.
      # CEP providers — tier 1 (endereço base, hedge paralelo)
      viaCepCB:
        baseConfig: default
      brasilApiCB:
        baseConfig: default
      awesomeApiCB:
        baseConfig: default
      # CEP providers — tier 2 (geocodificação opcional). CBs isolados do
      # tier 1 porque a falha do Nominatim sob rate-limit não pode poluir
      # a percepção dos providers de endereço.
      brasilApiV2GeoCB:
        baseConfig: default
      nominatimOsmCB:
        baseConfig: default
      # CEP — busca por endereço e geocodificação reversa. CBs separados dos
      # fluxos de consulta por CEP para isolar saúde de cada operação.
      viaCepBuscaCB:
        baseConfig: default
      nominatimReversoCB:
        baseConfig: default
      # CNPJ providers
      brasilApiCnpjCB:
        baseConfig: default
      receitaWsCB:
        baseConfig: default
      minhaReceitaCB:
        baseConfig: default
      # Calendário providers
      brasilApiFeriadosCB:
        baseConfig: default
      nagerDateCB:
        baseConfig: default
      # Taxas providers
      brasilApiTaxasCB:
        baseConfig: default
      bcbSgsCB:
        baseConfig: default
      hgBrasilCB:
        baseConfig: default
      # Rastreio providers
      linkAndTrackCB:
        baseConfig: default
      brasilApiRastreioCB:
        baseConfig: default
      correiosOficialCB:
        baseConfig: default
      # Bancos providers
      brasilApiBancosCB:
        baseConfig: default
      # Câmbio providers — Tier 1 (PTAX oficial) + Tier 2 (AwesomeAPI fallback).
      # CBs isolados para que falha do BCB OLINDA (gov.br pode picar) não
      # contamine a percepção da BrasilAPI ou do AwesomeAPI.
      cambioBrasilApiCB:
        baseConfig: default
      cambioBcbOlindaCB:
        baseConfig: default
      # Catálogo de moedas BCB (consultado por todo fetchPtax para validar
      # pares). CB isolado para que indisponibilidade do /Moedas não derrube
      # CBs dos providers de cotação — o fallback embutido cobre miss simultâneo.
      cambioMoedasCatalogCB:
        baseConfig: default
      # Endpoint público GET /financeiro/cambio/moedas — hedge entre BCB OLINDA
      # direto e BrasilAPI. CBs isolados para que falha de um proxy não polua
      # o estado do outro.
      cambioMoedasBcbCB:
        baseConfig: default
      cambioMoedasBrasilApiCB:
        baseConfig: default
      awesomeApiCambioCB:
        baseConfig: default
      # Jurídico providers
      cguSancoesCB:
        baseConfig: default
      cndSidecarCB:
        baseConfig: default
      datajudCB:
        baseConfig: default
      # Saúde — indicadores Previne Brasil/PMA via sidecar
      sisabIndicadoresCB:
        baseConfig: default
      # FIPE providers
      fipeOrgScraperCB:
        baseConfig: default
      brasilApiFipeCB:
        baseConfig: default
      parallelumFipeCB:
        baseConfig: default
      # NCM providers (Nomenclatura Comum do Mercosul)
      brasilApiNcmCB:
        baseConfig: default
      siscomexNcmCB:
        baseConfig: default
      # CNAE providers (Classificação Nacional de Atividades Econômicas)
      ibgeCnaeCB:
        baseConfig: default
      # Placa providers
      wdApiPlacaCB:
        baseConfig: default
      keplacaCB:
        baseConfig: default
      placaFipeScraperCB:
        baseConfig: default
      # Avaliação (scrapers) providers
      olxScraperCB:
        baseConfig: default
      mobiAutoScraperCB:
        baseConfig: default
      # Saúde (portais gov.br) providers
      fnsScraperCB:
        baseConfig: default
      eGestorScraperCB:
        baseConfig: default
      cnesScraperCB:
        baseConfig: default
      sisabScraperCB:
        baseConfig: default
      # ISBN providers — BrasilAPI primário + 4 fontes originais (CBL via Azure
      # Search, Google Books, Mercado Editorial, Open Library). Cada um isolado
      # para que indisponibilidade de um (CBL costuma flutuar) não contamine os
      # demais sob hedge.
      isbnBrasilApiCB:
        baseConfig: default
      isbnCblCB:
        baseConfig: default
      isbnGoogleBooksCB:
        baseConfig: default
      isbnMercadoEditorialCB:
        baseConfig: default
      isbnOpenLibraryCB:
        baseConfig: default
      # PIX participantes — BrasilAPI primário, BCB CSV fallback. CBs
      # isolados para que falha do CSV (lento, ~MB de download + parse) não
      # contamine a percepção da BrasilAPI (REST simples).
      pixBrasilApiCB:
        baseConfig: default
      pixBcbCsvCB:
        baseConfig: default
      # IBGE — UFs (single provider) + municípios (hedge) + população
      # (best-effort, agregado v3). Cada operação isolada para failure
      # independente.
      ibgeGovUfCB:
        baseConfig: default
      ibgeGovMunicipiosCB:
        baseConfig: default
      ibgePopulacaoCB:
        baseConfig: default
      dadosAbertosBrCB:
        baseConfig: default
      # CVM — single provider, mas o download é pesado (ZIP de corretoras,
      # CSV de ~10MB pra fundos). CBs isolados pra que falha de um snapshot
      # não derrube o outro.
      cvmCorretorasCB:
        baseConfig: default
      cvmFundosCB:
        baseConfig: default
      # B3 tickers — paginação paralela interna; CB único cobre os dois
      # endpoints (ações + fundos) porque vêm do mesmo upstream.
      b3TickersCB:
        baseConfig: default
      # ANATEL DDD — download CSV simples; CB único.
      anatelDddCB:
        baseConfig: default
      # CPTEC providers — hedge entre INPE direto (XML legado) e BrasilAPI.
      cptecInpeCB:
        baseConfig: default
      cptecBrasilApiCB:
        baseConfig: default
      # Registro.br providers
      registroBrOficialCB:
        baseConfig: default
      registroBrBrasilApiCB:
        baseConfig: default
      # TUSS — BrasilAPI primário, snapshot local de fallback (sem CB próprio
      # porque é in-memory; o CB cobre só o caminho de rede).
      tussBrasilApiCB:
        baseConfig: default
      # ────────────────────────────────────────────────────────────────────
      # Licitações — GovTech. Um CB por portal isola o estado dos 4
      # provedores (ComprasNet/PNCP REST, BLL scraping, BNC ajax interno,
      # Licitanet REST). A cascata sequencial no service faz tolerância a
      # falha por agregação parcial; o CB protege contra martelar portal
      # já reconhecido como fora.
      comprasnetCB:
        baseConfig: default
      bllCB:
        baseConfig: default
      bncCB:
        baseConfig: default
      licitanetCB:
        baseConfig: default
      # BrasilAPI fallbacks — só acionados quando o tier 1 (consulta direta
      # à fonte oficial) falha. CBs próprios pra que falha do fallback não
      # contamine a percepção dos providers diretos.
      # ────────────────────────────────────────────────────────────────────
      brasilApiDddCB:
        baseConfig: default
      brasilApiCvmCorretorasCB:
        baseConfig: default
      brasilApiCvmFundosCB:
        baseConfig: default
      brasilApiB3CB:
        baseConfig: default
      brasilApiIbgeCB:
        baseConfig: default

  timelimiter:
    configs:
      default:
        # APIs públicas brasileiras costumam ter latência variável; 3s é um teto razoável
        # antes de cancelar a chamada e devolver fallback.
        timeoutDuration: 3s
        cancelRunningFuture: true
    instances:
      # CEP providers — tier 1
      viaCepCB:
        baseConfig: default
      brasilApiCB:
        baseConfig: default
      awesomeApiCB:
        baseConfig: default
      # CEP geo providers — tier 2. Nominatim público é rate-limited (1 req/s)
      # e tipicamente latente; teto 5s evita pendurar a request quando o
      # servidor está saturado. BrasilAPI v2 já cacheia internamente — 3s sobra.
      brasilApiV2GeoCB:
        baseConfig: default
      nominatimOsmCB:
        baseConfig: default
        timeoutDuration: 5s
      # CEP — busca textual (ViaCEP) e geocodificação reversa (Nominatim).
      # Nominatim reverso recebe o mesmo teto de 5s do forward geocoder.
      viaCepBuscaCB:
        baseConfig: default
      nominatimReversoCB:
        baseConfig: default
        timeoutDuration: 5s
      # CNPJ providers
      brasilApiCnpjCB:
        baseConfig: default
      receitaWsCB:
        baseConfig: default
      minhaReceitaCB:
        baseConfig: default
      # Calendário providers
      brasilApiFeriadosCB:
        baseConfig: default
      nagerDateCB:
        baseConfig: default
      # Taxas providers
      brasilApiTaxasCB:
        baseConfig: default
      bcbSgsCB:
        baseConfig: default
      hgBrasilCB:
        baseConfig: default
      # Rastreio providers
      linkAndTrackCB:
        baseConfig: default
      brasilApiRastreioCB:
        baseConfig: default
      correiosOficialCB:
        baseConfig: default
      # Bancos providers
      brasilApiBancosCB:
        baseConfig: default
      # Câmbio providers — PTAX faz N chamadas internas (uma por moeda) +
      # retry retroativo no BCB; teto 15s cobre o caso pior (~7 retries para
      # encontrar a data + N moedas em paralelo).
      cambioBrasilApiCB:
        baseConfig: default
        timeoutDuration: 15s
      cambioBcbOlindaCB:
        baseConfig: default
        timeoutDuration: 15s
      # Catálogo de moedas — chamada simples e leve, default 3s sobra.
      cambioMoedasCatalogCB:
        baseConfig: default
      cambioMoedasBcbCB:
        baseConfig: default
      cambioMoedasBrasilApiCB:
        baseConfig: default
      awesomeApiCambioCB:
        baseConfig: default
      # Jurídico providers — DataJud e CGU CEIS rodam queries pesadas em
      # janelas de carga; Selenium do sidecar de CND pode levar dezenas de
      # segundos para emitir a certidão (cascata de formulários JSF).
      cguSancoesCB:
        baseConfig: default
        timeoutDuration: 10s
      cndSidecarCB:
        baseConfig: default
        timeoutDuration: 60s
      datajudCB:
        baseConfig: default
        timeoutDuration: 10s
      # Indicadores Previne Brasil — sidecar Python percorre cascata
      # JSF/Mojarra do SISAB (DataTables paginadas + multiselect cliente);
      # cold scrape leva 30-90s no caso pior. 120s alinha com sisabScraperCB.
      sisabIndicadoresCB:
        baseConfig: default
        timeoutDuration: 120s
      # FIPE providers — fipeOrg é scraper via FlareSolverr (Chromium cold ~5s + warm-up
      # GET + 1-5 POSTs por sweep de combustível); 30s cobre o caso pior com folga.
      fipeOrgScraperCB:
        baseConfig: default
        timeoutDuration: 30s
      brasilApiFipeCB:
        baseConfig: default
      parallelumFipeCB:
        baseConfig: default
      # NCM providers
      brasilApiNcmCB:
        baseConfig: default
      siscomexNcmCB:
        baseConfig: default
      # CNAE providers
      ibgeCnaeCB:
        baseConfig: default
      # Placa providers
      wdApiPlacaCB:
        baseConfig: default
      keplacaCB:
        baseConfig: default
      placaFipeScraperCB:
        baseConfig: default
      # Avaliação (scrapers) providers
      olxScraperCB:
        baseConfig: default
      mobiAutoScraperCB:
        baseConfig: default
      # Saúde (portais gov.br) providers — timeout estendido (15s) porque
      # consultafns e relatorioaps-prd são lentos sob carga e o ciclo do
      # FNS exige duas chamadas sequenciais. CB já contempla failure-rate.
      fnsScraperCB:
        baseConfig: default
        timeoutDuration: 15s
      eGestorScraperCB:
        baseConfig: default
        timeoutDuration: 15s
      # CNES é JSON puro porém faz N chamadas (1 por equipe); 20s cobre
      # estabelecimentos com muitas equipes. SISAB delega para sidecar Python
      # com Selenium headless — cold scrape leva 30–90s na cascata JSF
      # completa (jQuery.active waits, paginação DataTables); 120s evita
      # tripar o CB em municípios grandes com muitas equipes.
      cnesScraperCB:
        baseConfig: default
        timeoutDuration: 20s
      sisabScraperCB:
        baseConfig: default
        timeoutDuration: 120s
      # ISBN providers — defaults são suficientes (5s read no RestClient + 3s
      # logical timeout daqui). Open Library e Google Books costumam responder
      # em <1s; CBL via Azure Search pode picar até 2s sob carga.
      isbnBrasilApiCB:
        baseConfig: default
      isbnCblCB:
        baseConfig: default
      isbnGoogleBooksCB:
        baseConfig: default
      isbnMercadoEditorialCB:
        baseConfig: default
      isbnOpenLibraryCB:
        baseConfig: default
      # PIX providers
      pixBrasilApiCB:
        baseConfig: default
      # BCB CSV pode encadear até 7 tentativas de data + parsing — teto 30s
      # para cobrir o caso pior (Carnaval) sem pendurar a request.
      pixBcbCsvCB:
        baseConfig: default
        timeoutDuration: 30s
      # IBGE providers — REST simples; defaults 3s sobram.
      ibgeGovUfCB:
        baseConfig: default
      ibgeGovMunicipiosCB:
        baseConfig: default
      ibgePopulacaoCB:
        baseConfig: default
      dadosAbertosBrCB:
        baseConfig: default
      # CVM — download de ZIP/CSV grande + extração + parse. Teto generoso
      # (60s) porque a 1ª chamada do dia faz I/O pesado; chamadas subsequentes
      # vêm do cache e não passam por aqui.
      cvmCorretorasCB:
        baseConfig: default
        timeoutDuration: 60s
      cvmFundosCB:
        baseConfig: default
        timeoutDuration: 60s
      # B3 — 1ª chamada dispara N páginas em paralelo (sonda + N-1 paralelas
      # via virtual threads). Cada página típica responde em <1s; teto 30s
      # cobre worst case de ~600 ações = 5 páginas com upstream lento.
      b3TickersCB:
        baseConfig: default
        timeoutDuration: 30s
      # ANATEL DDD — download CSV pequeno (~few KB); default 3s sobra.
      anatelDddCB:
        baseConfig: default
      # CPTEC providers — INPE pode picar sob carga matinal; teto 10s para
      # cobrir parse de XML de capitais (~30KB) com upstream lento.
      cptecInpeCB:
        baseConfig: default
        timeoutDuration: 10s
      cptecBrasilApiCB:
        baseConfig: default
        timeoutDuration: 10s
      # Registro.br — JSON simples, default 3s sobra.
      registroBrOficialCB:
        baseConfig: default
      registroBrBrasilApiCB:
        baseConfig: default
      # TUSS — chamada REST simples; default 3s sobra.
      tussBrasilApiCB:
        baseConfig: default
      # Licitações — GovTech. ComprasNet/PNCP é REST oficial e barato (default
      # 3s sobra). BLL faz scraping HTML pesado (~600KB de página), eleva
      # timeout para 12s — alinha com timeout-millis do Jsoup configurado em
      # gateway.licitacoes.bll. BNC/Licitanet são REST internos, default sobra.
      comprasnetCB:
        baseConfig: default
      bllCB:
        baseConfig: default
        timeoutDuration: 70s   # cobre captcha solver (até ~60s) + scraping inicial (~3s)
      bncCB:
        baseConfig: default
        timeoutDuration: 70s
      licitanetCB:
        baseConfig: default
        timeoutDuration: 10s
      # BrasilAPI fallbacks — JSON pré-agregado, single round-trip. Default
      # 3s cobre quase tudo. CVM Fundos paginado pode ser ligeiramente mais
      # lento sob carga, mas ainda dentro do default.
      brasilApiDddCB:
        baseConfig: default
      brasilApiCvmCorretorasCB:
        baseConfig: default
      brasilApiCvmFundosCB:
        baseConfig: default
        timeoutDuration: 10s
      brasilApiB3CB:
        baseConfig: default
        timeoutDuration: 10s
      brasilApiIbgeCB:
        baseConfig: default

logging:
  level:
    root: INFO
    br.com.cernebr.gatewaynacional: DEBUG
    io.github.resilience4j: INFO
