spring:
  application:
    name: gateway-nacional

  # Habilita Virtual Threads (Project Loom / JEP 444).
  # Cada request HTTP roda em uma virtual thread, permitindo altíssima concorrência
  # em chamadas I/O-bound (ViaCEP, ReceitaWS) sem o custo de pool de threads tradicional.
  threads:
    virtual:
      enabled: true

  data:
    redis:
      # Redis é usado como cache distribuído de respostas (CEP/CNPJ).
      # Em produção, sobrescrever via variável de ambiente SPRING_DATA_REDIS_HOST.
      host: localhost
      port: 6379
      timeout: 2s
      connect-timeout: 1s
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2

server:
  port: 8080
  # Encerramento gracioso: drena requests em voo antes de finalizar (importante em rolling deploys).
  shutdown: graceful

gateway:
  rate-limit:
    enabled: false # Mantido desativado por padrão para uso corporativo (Self-Hosted). Para o Playground público, injetar env GATEWAY_RATE_LIMIT_ENABLED=true
  flaresolverr:
    # URL do sidecar FlareSolverr (https://github.com/FlareSolverr/FlareSolverr).
    # OPCIONAL para o módulo Placa (fallback PlacaFipe). OBRIGATÓRIO para
    # CNES, e-Gestor e FIPE-Oficial — sem ele, essas rotas devolvem 503 com
    # "Esta rota exige a ativação do sidecar FlareSolverr...".
    url: ${GATEWAY_FLARESOLVERR_URL:}
    max-timeout-ms: 60000
  # ─────────────────────────────────────────────────────────────────────────
  # Sidecar Python dedicado para SISAB Validação. Necessário porque a página
  # JSF/Mojarra usa plugins Bootstrap Multiselect cujo estado só sincroniza
  # via cliques reais no DOM — FlareSolverr v3 não expõe primitivas de
  # interação JS (executeJS, click). Container provido em
  # services/sisab-sidecar/ no docker-compose.
  sisab-sidecar:
    url: ${GATEWAY_SISAB_SIDECAR_URL:}
  # Base URLs por provedor — sobrescritas em test profile (WireMock) e
  # eventualmente em deploys que precisem apontar para mirrors internos.
  taxas:
    brasilapi:
      base-url: https://brasilapi.com.br
    bcb-sgs:
      base-url: https://api.bcb.gov.br
    hg-brasil:
      base-url: https://api.hgbrasil.com
      api-key: development
  rastreio:
    linketrack:
      base-url: https://api.linketrack.com
      user: teste
      # Token público de testes do Link&Track — para SLA produtivo, sobrescrever via env.
      token: 1abcd00b2731640e886fb41a8a9671ad1434c599dbaa0a0de9a5aa619f29a83f
    brasilapi:
      base-url: https://brasilapi.com.br
      path: /api/corretoras/v1/{codigo}
    correios-oficial:
      base-url: https://api.correios.com.br
      path: /srorastro/v1/objetos/{codigo}
  bancos:
    brasilapi:
      base-url: https://brasilapi.com.br
  isbn:
    # Consulta de dados bibliográficos por ISBN-10/13. Hedge entre 5 fontes:
    # BrasilAPI (primário, RULE B — já consolida internamente os 4 originais);
    # CBL (Câmara Brasileira do Livro via Azure Cognitive Search), Google Books,
    # Mercado Editorial (BR-only), Open Library (cobertura mundial e capa).
    # Cache 365d porque livro publicado é "frozen"; soft-TTL 90d via RAC.
    brasilapi:
      base-url: https://brasilapi.com.br
    cbl:
      base-url: https://isbn-search-br.search.windows.net
      # API key pública do site oficial da CBL (mesma usada pela BrasilAPI).
      # Vazia → o client decodifica o default base64 embutido. Sobrescrever
      # via GATEWAY_ISBN_CBL_API_KEY caso a CBL rotacione a chave.
      api-key: ${GATEWAY_ISBN_CBL_API_KEY:}
    google-books:
      base-url: https://www.googleapis.com/books/v1
    mercado-editorial:
      base-url: https://api.mercadoeditorial.org/api/v1.2
    open-library:
      base-url: https://openlibrary.org
  cambio:
    # Tier 1 — PTAX oficial (Banco Central). Hedge entre proxy BrasilAPI e
    # OLINDA direto: o primeiro a responder vence. Dados regulatórios usados
    # em IR, balanço contábil, contratos públicos.
    brasilapi:
      base-url: https://brasilapi.com.br
    bcb:
      # Endpoint OLINDA do BCB. Date format do upstream é MM-DD-YYYY (US-style).
      base-url: https://olinda.bcb.gov.br
      # Quantos dias retroceder antes de desistir (cobre Carnaval + fim de
      # semana adjacente). Cada moeda só faz UMA tentativa por data — a
      # data resolvida pelo par-sonda é reusada pelos demais.
      max-fallback-days: 7
    # Tier 2 — AwesomeAPI (spot real-time comercial). Único provider que
    # cobre cripto e cross-currency sem BRL. Cache 3min; só é invocado quando
    # PTAX não pode atender (par não-elegível ou ambos PTAX providers down).
    awesomeapi:
      base-url: https://economia.awesomeapi.com.br
  pix:
    # Listagem de participantes do PIX. Cascata BrasilAPI (primário, RULE B —
    # já consolida o CSV do BCB internamente) → BCB CSV oficial. Cache 24h
    # com soft-TTL 6h via RAC alinha com a cadência de publicação do BCB
    # (1 arquivo novo por dia útil bancário).
    brasilapi:
      base-url: https://brasilapi.com.br
    bcb:
      base-url: https://www.bcb.gov.br
      # Quantos dias retroceder antes de desistir do CSV. 7 cobre o caso
      # pior (Carnaval 5 dias úteis pulados + fim de semana adjacente).
      # Tunning: na maioria das requests, a 1ª tentativa (hoje) já resolve.
      max-fallback-days: 7
  juridico:
    sancoes:
      # CGU Portal da Transparência (CEIS) — exige header chave-api-dados
      # obtido por cadastro em portaldatransparencia.gov.br/api-de-dados/cadastrar-email.
      # Sem a chave, o SancoesClient curto-circuita antes do round-trip e
      # devolve 503 com mensagem específica.
      cgu:
        base-url: https://api.portaldatransparencia.gov.br
        path: /api-de-dados/ceis
        cnpj-param: cnpjSancionado
        api-key: ${GATEWAY_JURIDICO_SANCOES_CGU_API_KEY:}
    processos:
      # DataJud / CNJ — POST a /api_publica_{alias}/_search com body
      # Elasticsearch DSL. A api-key padrão é a chave pública documentada
      # pelo CNJ; sobrescrever via env caso o CNJ rotacione a credencial.
      datajud:
        base-url: https://api-publica.datajud.cnj.jus.br
        api-key: ${GATEWAY_JURIDICO_PROCESSOS_DATAJUD_API_KEY:cDZHYzlZa0JadVREZDJCendQbXY6SkJlTzNjLV9TRENyQk1RdnFKZGRQdw==}
  cnae:
    # Classificação Nacional de Atividades Econômicas — pareada com CNPJ.
    # IBGE servicodados é a fonte canônica (publica a tabela CONCLA).
    # Fallback é um JSON local bake-into-image em data/cnae_subclasses.json
    # — não precisa de configuração externa.
    ibge:
      base-url: https://servicodados.ibge.gov.br
  ibge:
    # Domínio geográfico próprio: lista de UFs, detalhe (com população),
    # municípios por UF. Hedge entre 2 providers REST simples para municípios.
    # Provider Wikipedia da BrasilAPI NÃO foi portado (política PESADO —
    # scraping HTML é frágil e custoso).
    gov:
      base-url: https://servicodados.ibge.gov.br
    dados-abertos-br:
      # API legada em HTTP (não HTTPS). Sobrescrever caso uma versão segura apareça.
      base-url: http://educacao.dadosabertosbr.com
  cvm:
    # Cadastro CVM — corretoras (ZIP→CSV) e fundos (CSV direto). Single
    # provider (a CVM é fonte canônica). URLs absolutas porque os arquivos
    # vivem em paths fixos do dados.cvm.gov.br.
    corretoras:
      url: https://dados.cvm.gov.br/dados/INTERMED/CAD/DADOS/cad_intermed.zip
    fundos:
      url: https://dados.cvm.gov.br/dados/FI/CAD/DADOS/cad_fi.csv
  b3:
    # Listagens de tickers da B3. Endpoint público que aceita parâmetros
    # como JSON-base64 no PATH (peculiaridade do upstream). Single provider —
    # B3 é fonte canônica das listagens.
    base-url: https://sistemaswebb3-listados.b3.com.br
  ddd:
    # Quadro nacional de DDDs publicado pela ANATEL em CSV (latin-1).
    # Single provider; cache 365d cobre downtimes longos.
    anatel:
      url: https://www.anatel.gov.br/dadosabertos/PDA/Codigo_Nacional/PGCN.csv
  ncm:
    # Nomenclatura Comum do Mercosul (NCM) — fundamental para emissão de
    # NF-e. Cascata BrasilAPI → Siscomex; cache de 30 dias.
    brasilapi:
      base-url: https://brasilapi.com.br
    siscomex:
      # O Portal Único Siscomex descontinuou a consulta individual por
      # código (a rota /classif/api/publico/nomenclatura/{codigo} retornava
      # 404). Hoje o canal oficial é o dump JSON da tabela inteira,
      # atualizado diariamente. O Siscomex responde 307 e redireciona para
      # `?perfil=PUBLICO`; o cliente segue o redirect automaticamente.
      url: https://portalunico.siscomex.gov.br/classif/api/publico/nomenclatura/download/json
  fipe:
    # Provedor primário: scraper direto da fundação oficial via FlareSolverr.
    # BrasilAPI e Parallelum entraram em colapso simultâneo em 2026-05 (proxies
    # deles bloqueados pelo upstream da FIPE) — ir direto na fonte com
    # FlareSolverr é o único caminho que não depende de terceiros frágeis.
    fipeorg:
      base-url: https://veiculos.fipe.org.br
    brasilapi:
      base-url: https://brasilapi.com.br
    parallelum:
      base-url: https://parallelum.com.br
      path: /fipe/api/v1/carros/veiculos/{codigoFipe}/{anoModelo}
  placa:
    wdapi:
      base-url: https://wdapi2.com.br
    keplaca:
      base-url: https://api.keplaca.com
      # Placeholder — sobrescrever via env GATEWAY_PLACA_KEPLACA_TOKEN em produção.
      # Com este valor, o KeplacaClient curto-circuita antes da chamada HTTP e
      # cascateia para o próximo provedor.
      token: your_token_here
    placafipe:
      # Fallback 100% gratuito (Web Scraping). Único provedor da cascata
      # que entrega o codigoFipe associado à placa — alimenta o módulo
      # Avaliação sem exigir codigoFipe manual do cliente.
      base-url: https://placafipe.com
      timeout-millis: 5000
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
  saude:
    # Portais governamentais de inteligência financeira da APS.
    # FNS é uma SPA que serve dados via JSON em endpoints internos —
    # quando gov.br aplica anti-bot, o CB trips e o gateway devolve 503
    # com mensagem clara em vez de stacktrace.
    fns:
      base-url: https://consultafns.saude.gov.br
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    egestor:
      base-url: https://relatorioaps-prd.saude.gov.br
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    cnes:
      # DATASUS — JSON puro nos endpoints internos /services/estabelecimentos-equipes.
      base-url: https://cnes.datasus.gov.br
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    sisab:
      # SISAB depende do sidecar Python dedicado (Selenium + Chromium headless)
      # configurado em `gateway.sisab-sidecar.url` na raiz deste arquivo.
      # As propriedades abaixo são documentação canônica do upstream — não
      # são usadas pelo cliente atual (delega 100% ao sidecar) mas ficam
      # como ponto de extensão futura.
      base-url: https://sisab.saude.gov.br
      report-path: /paginas/acessoRestrito/relatorio/federal/envio/RelValidacao.xhtml
  avaliacao:
    # Marketplaces consultados via Web Scraping. URLs e templates são
    # configuráveis porque a estrutura dos sites muda — basta sobrescrever
    # via env (ex: GATEWAY_AVALIACAO_OLX_SEARCH_PATH) sem novo deploy.
    # User-Agent neutro e identificável; ajuste conforme política de
    # robots.txt e termos de uso de cada marketplace antes do uso produtivo.
    olx:
      base-url: https://www.olx.com.br
      search-path: /autos-e-pecas/carros-vans-e-utilitarios/{marca}/{modelo}/ano-{ano}
      timeout-millis: 5000
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)
    mobiauto:
      base-url: https://www.mobiauto.com.br
      search-path: /comprar/{marca}/{modelo}/{ano}
      timeout-millis: 5000
      user-agent: Mozilla/5.0 (compatible; GatewayNacional/1.0)

# Actuator: expõe apenas o necessário para observabilidade externa.
# Prometheus faz scrape em /actuator/prometheus; health é consumido por liveness/readiness probes.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      # Tag global em todas as métricas — facilita filtros por instância no Grafana.
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Documentação OpenAPI / Swagger UI.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Configuração base do Resilience4j.
# Janela deslizante por contagem (10 chamadas) — adequada para APIs externas de baixo throughput.
# Failure rate 50% balanceia sensibilidade vs. ruído transitório do ViaCEP.
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true        # Expõe estado do CB no /actuator/health
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 10             # Não abre antes de ter amostra mínima
        failureRateThreshold: 50             # % de falhas para transicionar para OPEN
        waitDurationInOpenState: 15s         # Tempo em OPEN antes de tentar HALF_OPEN
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      # Uma instância por provedor — isola estado (open/closed/half-open) por upstream,
      # evitando que falha do ViaCEP "contamine" a saúde percebida do BrasilAPI.
      # CEP providers
      viaCepCB:
        baseConfig: default
      brasilApiCB:
        baseConfig: default
      awesomeApiCB:
        baseConfig: default
      # CNPJ providers
      brasilApiCnpjCB:
        baseConfig: default
      receitaWsCB:
        baseConfig: default
      minhaReceitaCB:
        baseConfig: default
      # Calendário providers
      brasilApiFeriadosCB:
        baseConfig: default
      nagerDateCB:
        baseConfig: default
      # Taxas providers
      brasilApiTaxasCB:
        baseConfig: default
      bcbSgsCB:
        baseConfig: default
      hgBrasilCB:
        baseConfig: default
      # Rastreio providers
      linkAndTrackCB:
        baseConfig: default
      brasilApiRastreioCB:
        baseConfig: default
      correiosOficialCB:
        baseConfig: default
      # Bancos providers
      brasilApiBancosCB:
        baseConfig: default
      # Câmbio providers — Tier 1 (PTAX oficial) + Tier 2 (AwesomeAPI fallback).
      # CBs isolados para que falha do BCB OLINDA (gov.br pode picar) não
      # contamine a percepção da BrasilAPI ou do AwesomeAPI.
      cambioBrasilApiCB:
        baseConfig: default
      cambioBcbOlindaCB:
        baseConfig: default
      # Catálogo de moedas BCB (consultado por todo fetchPtax para validar
      # pares). CB isolado para que indisponibilidade do /Moedas não derrube
      # CBs dos providers de cotação — o fallback embutido cobre miss simultâneo.
      cambioMoedasCatalogCB:
        baseConfig: default
      awesomeApiCambioCB:
        baseConfig: default
      # Jurídico providers
      cguSancoesCB:
        baseConfig: default
      cndSidecarCB:
        baseConfig: default
      datajudCB:
        baseConfig: default
      # Saúde — indicadores Previne Brasil/PMA via sidecar
      sisabIndicadoresCB:
        baseConfig: default
      # FIPE providers
      fipeOrgScraperCB:
        baseConfig: default
      brasilApiFipeCB:
        baseConfig: default
      parallelumFipeCB:
        baseConfig: default
      # NCM providers (Nomenclatura Comum do Mercosul)
      brasilApiNcmCB:
        baseConfig: default
      siscomexNcmCB:
        baseConfig: default
      # CNAE providers (Classificação Nacional de Atividades Econômicas)
      ibgeCnaeCB:
        baseConfig: default
      # Placa providers
      wdApiPlacaCB:
        baseConfig: default
      keplacaCB:
        baseConfig: default
      placaFipeScraperCB:
        baseConfig: default
      # Avaliação (scrapers) providers
      olxScraperCB:
        baseConfig: default
      mobiAutoScraperCB:
        baseConfig: default
      # Saúde (portais gov.br) providers
      fnsScraperCB:
        baseConfig: default
      eGestorScraperCB:
        baseConfig: default
      cnesScraperCB:
        baseConfig: default
      sisabScraperCB:
        baseConfig: default
      # ISBN providers — BrasilAPI primário + 4 fontes originais (CBL via Azure
      # Search, Google Books, Mercado Editorial, Open Library). Cada um isolado
      # para que indisponibilidade de um (CBL costuma flutuar) não contamine os
      # demais sob hedge.
      isbnBrasilApiCB:
        baseConfig: default
      isbnCblCB:
        baseConfig: default
      isbnGoogleBooksCB:
        baseConfig: default
      isbnMercadoEditorialCB:
        baseConfig: default
      isbnOpenLibraryCB:
        baseConfig: default
      # PIX participantes — BrasilAPI primário, BCB CSV fallback. CBs
      # isolados para que falha do CSV (lento, ~MB de download + parse) não
      # contamine a percepção da BrasilAPI (REST simples).
      pixBrasilApiCB:
        baseConfig: default
      pixBcbCsvCB:
        baseConfig: default
      # IBGE — UFs (single provider) + municípios (hedge) + população
      # (best-effort, agregado v3). Cada operação isolada para failure
      # independente.
      ibgeGovUfCB:
        baseConfig: default
      ibgeGovMunicipiosCB:
        baseConfig: default
      ibgePopulacaoCB:
        baseConfig: default
      dadosAbertosBrCB:
        baseConfig: default
      # CVM — single provider, mas o download é pesado (ZIP de corretoras,
      # CSV de ~10MB pra fundos). CBs isolados pra que falha de um snapshot
      # não derrube o outro.
      cvmCorretorasCB:
        baseConfig: default
      cvmFundosCB:
        baseConfig: default
      # B3 tickers — paginação paralela interna; CB único cobre os dois
      # endpoints (ações + fundos) porque vêm do mesmo upstream.
      b3TickersCB:
        baseConfig: default
      # ANATEL DDD — download CSV simples; CB único.
      anatelDddCB:
        baseConfig: default

  timelimiter:
    configs:
      default:
        # APIs públicas brasileiras costumam ter latência variável; 3s é um teto razoável
        # antes de cancelar a chamada e devolver fallback.
        timeoutDuration: 3s
        cancelRunningFuture: true
    instances:
      # CEP providers
      viaCepCB:
        baseConfig: default
      brasilApiCB:
        baseConfig: default
      awesomeApiCB:
        baseConfig: default
      # CNPJ providers
      brasilApiCnpjCB:
        baseConfig: default
      receitaWsCB:
        baseConfig: default
      minhaReceitaCB:
        baseConfig: default
      # Calendário providers
      brasilApiFeriadosCB:
        baseConfig: default
      nagerDateCB:
        baseConfig: default
      # Taxas providers
      brasilApiTaxasCB:
        baseConfig: default
      bcbSgsCB:
        baseConfig: default
      hgBrasilCB:
        baseConfig: default
      # Rastreio providers
      linkAndTrackCB:
        baseConfig: default
      brasilApiRastreioCB:
        baseConfig: default
      correiosOficialCB:
        baseConfig: default
      # Bancos providers
      brasilApiBancosCB:
        baseConfig: default
      # Câmbio providers — PTAX faz N chamadas internas (uma por moeda) +
      # retry retroativo no BCB; teto 15s cobre o caso pior (~7 retries para
      # encontrar a data + N moedas em paralelo).
      cambioBrasilApiCB:
        baseConfig: default
        timeoutDuration: 15s
      cambioBcbOlindaCB:
        baseConfig: default
        timeoutDuration: 15s
      # Catálogo de moedas — chamada simples e leve, default 3s sobra.
      cambioMoedasCatalogCB:
        baseConfig: default
      awesomeApiCambioCB:
        baseConfig: default
      # Jurídico providers — DataJud e CGU CEIS rodam queries pesadas em
      # janelas de carga; Selenium do sidecar de CND pode levar dezenas de
      # segundos para emitir a certidão (cascata de formulários JSF).
      cguSancoesCB:
        baseConfig: default
        timeoutDuration: 10s
      cndSidecarCB:
        baseConfig: default
        timeoutDuration: 60s
      datajudCB:
        baseConfig: default
        timeoutDuration: 10s
      # Indicadores Previne Brasil — sidecar Python percorre cascata
      # JSF/Mojarra do SISAB (DataTables paginadas + multiselect cliente);
      # cold scrape leva 30-90s no caso pior. 120s alinha com sisabScraperCB.
      sisabIndicadoresCB:
        baseConfig: default
        timeoutDuration: 120s
      # FIPE providers — fipeOrg é scraper via FlareSolverr (Chromium cold ~5s + warm-up
      # GET + 1-5 POSTs por sweep de combustível); 30s cobre o caso pior com folga.
      fipeOrgScraperCB:
        baseConfig: default
        timeoutDuration: 30s
      brasilApiFipeCB:
        baseConfig: default
      parallelumFipeCB:
        baseConfig: default
      # NCM providers
      brasilApiNcmCB:
        baseConfig: default
      siscomexNcmCB:
        baseConfig: default
      # CNAE providers
      ibgeCnaeCB:
        baseConfig: default
      # Placa providers
      wdApiPlacaCB:
        baseConfig: default
      keplacaCB:
        baseConfig: default
      placaFipeScraperCB:
        baseConfig: default
      # Avaliação (scrapers) providers
      olxScraperCB:
        baseConfig: default
      mobiAutoScraperCB:
        baseConfig: default
      # Saúde (portais gov.br) providers — timeout estendido (15s) porque
      # consultafns e relatorioaps-prd são lentos sob carga e o ciclo do
      # FNS exige duas chamadas sequenciais. CB já contempla failure-rate.
      fnsScraperCB:
        baseConfig: default
        timeoutDuration: 15s
      eGestorScraperCB:
        baseConfig: default
        timeoutDuration: 15s
      # CNES é JSON puro porém faz N chamadas (1 por equipe); 20s cobre
      # estabelecimentos com muitas equipes. SISAB delega para sidecar Python
      # com Selenium headless — cold scrape leva 30–90s na cascata JSF
      # completa (jQuery.active waits, paginação DataTables); 120s evita
      # tripar o CB em municípios grandes com muitas equipes.
      cnesScraperCB:
        baseConfig: default
        timeoutDuration: 20s
      sisabScraperCB:
        baseConfig: default
        timeoutDuration: 120s
      # ISBN providers — defaults são suficientes (5s read no RestClient + 3s
      # logical timeout daqui). Open Library e Google Books costumam responder
      # em <1s; CBL via Azure Search pode picar até 2s sob carga.
      isbnBrasilApiCB:
        baseConfig: default
      isbnCblCB:
        baseConfig: default
      isbnGoogleBooksCB:
        baseConfig: default
      isbnMercadoEditorialCB:
        baseConfig: default
      isbnOpenLibraryCB:
        baseConfig: default
      # PIX providers
      pixBrasilApiCB:
        baseConfig: default
      # BCB CSV pode encadear até 7 tentativas de data + parsing — teto 30s
      # para cobrir o caso pior (Carnaval) sem pendurar a request.
      pixBcbCsvCB:
        baseConfig: default
        timeoutDuration: 30s
      # IBGE providers — REST simples; defaults 3s sobram.
      ibgeGovUfCB:
        baseConfig: default
      ibgeGovMunicipiosCB:
        baseConfig: default
      ibgePopulacaoCB:
        baseConfig: default
      dadosAbertosBrCB:
        baseConfig: default
      # CVM — download de ZIP/CSV grande + extração + parse. Teto generoso
      # (60s) porque a 1ª chamada do dia faz I/O pesado; chamadas subsequentes
      # vêm do cache e não passam por aqui.
      cvmCorretorasCB:
        baseConfig: default
        timeoutDuration: 60s
      cvmFundosCB:
        baseConfig: default
        timeoutDuration: 60s
      # B3 — 1ª chamada dispara N páginas em paralelo (sonda + N-1 paralelas
      # via virtual threads). Cada página típica responde em <1s; teto 30s
      # cobre worst case de ~600 ações = 5 páginas com upstream lento.
      b3TickersCB:
        baseConfig: default
        timeoutDuration: 30s
      # ANATEL DDD — download CSV pequeno (~few KB); default 3s sobra.
      anatelDddCB:
        baseConfig: default

logging:
  level:
    root: INFO
    br.com.cernebr.gatewaynacional: DEBUG
    io.github.resilience4j: INFO
