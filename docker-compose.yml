services:
  redis:
    image: redis:7-alpine
    container_name: gateway-nacional-redis
    restart: unless-stopped
    # Acessível apenas via rede interna `gateway-net` — em produção, banco
    # de dados nunca deve ficar publicado no host. Para depuração local
    # (redis-cli, RedisInsight), troque temporariamente por `ports:` ou
    # rode os comandos via `docker exec gateway-nacional-redis redis-cli`.
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gateway-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gateway-nacional:latest
    container_name: gateway-nacional-api
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # ── FlareSolverr (anti-bot sidecar) ───────────────────────────────────
      # Necessário para: CNES, e-Gestor, FIPE-Oficial e fallback PlacaFipe.
      # Sem esta variável apontada, as rotas Saúde devolvem 503 com
      # mensagem clara orientando ativação.
      GATEWAY_FLARESOLVERR_URL: http://flaresolverr:8191
      # ── SISAB sidecar (Python + Selenium + Chromium headless) ────────────
      # Necessário para /api/v1/saude/sisab/* (validação de produção).
      # A página JSF/Mojarra do SISAB usa plugins Bootstrap Multiselect cujo
      # estado só é sincronizado via cliques reais no DOM — HTTP puro
      # produz IndexOutOfBoundsException no backend. O sidecar Python encapsula
      # o Selenium driver e expõe um endpoint REST consumido por este Java.
      # Sem esta variável, /api/v1/saude/sisab/* responde 503 com mensagem clara.
      GATEWAY_SISAB_SIDECAR_URL: http://sisab-sidecar:8000
      # ── Histórico Veicular Premium (orquestração híbrida) ────────────────
      # Com a chave preenchida, o gateway consome a API premium oficial em
      # milissegundos. Vazia (default), o client premium curto-circuita e a
      # malha de scrapers gratuitos assume como fallback de resiliência.
      GATEWAY_OLHONOCARRO_KEY: ${GATEWAY_OLHONOCARRO_KEY:-}
      GATEWAY_CHECKAUTO_KEY: ${GATEWAY_CHECKAUTO_KEY:-}
      # ── Motor de depreciação automática por risco ────────────────────────
      # Redutor sobre o preço de mercado quando há indício de leilão/sinistro.
      # Clampeado à faixa mandatória [0.20, 0.30] no boot.
      GATEWAY_VEICULAR_RISCO_REDUTOR_MEDIO: ${GATEWAY_VEICULAR_RISCO_REDUTOR_MEDIO:-0.20}
      GATEWAY_VEICULAR_RISCO_REDUTOR_ALTO: ${GATEWAY_VEICULAR_RISCO_REDUTOR_ALTO:-0.30}
    depends_on:
      redis:
        condition: service_healthy
      flaresolverr:
        condition: service_started
      sisab-sidecar:
        condition: service_healthy
    volumes:
      - sigtap-db:/app/data                       # Persiste o banco SQLite (Indexador SIGTAP)
      - sigtap-work:/home/app/.gateway-nacional   # Persiste o ZIP da competência (Download)
    networks:
      - gateway-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: gateway-nacional-flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
    networks:
      - gateway-net

  # ─────────────────────────────────────────────────────────────────────────
  # SISAB Sidecar — Python + FastAPI + Selenium + Chromium headless.
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve a única rota do gateway (SISAB Validação) que não é alcançável
  # via HTTP puro nem via FlareSolverr — a página depende de plugins JS
  # Bootstrap Multiselect cujo estado só é sincronizado via cliques reais.
  # Implementação reusa lógica testada em produção do projeto AutoAPSFinancias.
  sisab-sidecar:
    build:
      context: ./services/sisab-sidecar
      dockerfile: Dockerfile
    image: gateway-nacional-sisab-sidecar:latest
    container_name: gateway-nacional-sisab-sidecar
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
      # Chrome em containers exige memória compartilhada generosa para
      # renderizar páginas JSF complexas. /dev/shm padrão Docker é 64M,
      # insuficiente — definimos 2g via shm_size abaixo.
      PYTHONUNBUFFERED: "1"
    shm_size: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  redis-data:
  sigtap-db:
  sigtap-work:
