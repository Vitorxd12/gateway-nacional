services:
  redis:
    image: redis:7-alpine
    container_name: gateway-nacional-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gateway-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gateway-nacional:latest
    container_name: gateway-nacional-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # ── FlareSolverr (anti-bot sidecar) ───────────────────────────────────
      # Descomente a linha abaixo EM CONJUNTO com o serviço `flaresolverr`
      # mais adiante neste arquivo. Sem isso, as rotas /api/v1/saude/*
      # (CNES, e-Gestor, SISAB) e o fallback PlacaFipe respondem 503 com
      # mensagem clara de "exige FlareSolverr".
      GATEWAY_FLARESOLVERR_URL: http://flaresolverr:8191
    depends_on:
      redis:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    networks:
      - gateway-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: gateway-nacional-flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  redis-data:
