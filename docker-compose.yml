services:
  redis:
    image: redis:7-alpine
    container_name: gateway-nacional-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gateway-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gateway-nacional:latest
    container_name: gateway-nacional-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # ── FlareSolverr (anti-bot sidecar) ───────────────────────────────────
      # Necessário para: CNES, e-Gestor, FIPE-Oficial e fallback PlacaFipe.
      # Sem esta variável apontada, as rotas Saúde devolvem 503 com
      # mensagem clara orientando ativação.
      GATEWAY_FLARESOLVERR_URL: http://flaresolverr:8191
      # ── SISAB sidecar (Python + Selenium + Chromium headless) ────────────
      # Necessário para /api/v1/saude/sisab/* (validação de produção).
      # A página JSF/Mojarra do SISAB usa plugins Bootstrap Multiselect cujo
      # estado só é sincronizado via cliques reais no DOM — HTTP puro
      # produz IndexOutOfBoundsException no backend. O sidecar Python encapsula
      # o Selenium driver e expõe um endpoint REST consumido por este Java.
      # Sem esta variável, /api/v1/saude/sisab/* responde 503 com mensagem clara.
      GATEWAY_SISAB_SIDECAR_URL: http://sisab-sidecar:8000
    depends_on:
      redis:
        condition: service_healthy
      flaresolverr:
        condition: service_started
      sisab-sidecar:
        condition: service_healthy
    networks:
      - gateway-net

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: gateway-nacional-flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
    networks:
      - gateway-net

  # ─────────────────────────────────────────────────────────────────────────
  # SISAB Sidecar — Python + FastAPI + Selenium + Chromium headless.
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve a única rota do gateway (SISAB Validação) que não é alcançável
  # via HTTP puro nem via FlareSolverr — a página depende de plugins JS
  # Bootstrap Multiselect cujo estado só é sincronizado via cliques reais.
  # Implementação reusa lógica testada em produção do projeto AutoAPSFinancias.
  sisab-sidecar:
    build:
      context: ./services/sisab-sidecar
      dockerfile: Dockerfile
    image: gateway-nacional-sisab-sidecar:latest
    container_name: gateway-nacional-sisab-sidecar
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      LOG_LEVEL: info
      TZ: America/Sao_Paulo
      # Chrome em containers exige memória compartilhada generosa para
      # renderizar páginas JSF complexas. /dev/shm padrão Docker é 64M,
      # insuficiente — definimos 2g via shm_size abaixo.
      PYTHONUNBUFFERED: "1"
    shm_size: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - gateway-net

networks:
  gateway-net:
    driver: bridge

volumes:
  redis-data:
